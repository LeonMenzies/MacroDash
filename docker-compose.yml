services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRED_API_KEY: ${FRED_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      PORT: 4001
    ports:
      - "4001:4001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - server
